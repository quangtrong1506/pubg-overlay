appId: com.trongsadoa.wwbu.ovelay
productName: Wwbu
copyright: Copyright © 2024 TrongSaDoa
directories:
  output: dist
  buildResources: resources
extraResources:
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.icns
    to: icon.icns

artifactName: 'Wwbu.${version}.setup.${ext}'
nsis:
  createDesktopShortcut: true
  createStartMenuShortcut: true
  oneClick: true
  runAfterFinish: true
files:
  - from: .
    filter:
      - package.json
      - app
publish: null
linux:
  target:
    - deb
    - rpm
    - snap
  category: Utility
