name: CI

on:
  pull_request:
    branches:
      - '*'

  push:
    branches:
      - '*'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  lint-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next Build
        run: npm run next:build

  build:
    needs: lint-test

    if: github.event_name == 'push'

    runs-on: windows-latest

    environment: GH_TOKEN

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron
        run: npm run build

      - name: Release
        if: github.ref == 'refs/heads/main'
        run: npx semantic-release
